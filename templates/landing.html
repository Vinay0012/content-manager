<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		html, body{
  margin:0;
  padding:0;
  overflow:hidden;
}

.landing{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image: url('/static/landing.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  cursor: pointer;
}
		
	</style>
</head>
<body>
<div class="landing" onclick="goToFeed()"></div>


<script>
function goToFeed(){
	window.location.href = "{{ url_for('feed') }}"
}
</script>

</body>
</html>
