<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<style>
		html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  overscroll-behavior: none;
}

.landing {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.landing a {
  display: block;
  width: 100%;
  height: 100%;
}

.landing-img {
  width: 100vw;          /* 🔥 use viewport width */
  height: 100vh;         /* 🔥 use viewport height */
  max-width: 100%;       /* 🔥 prevent overflow */
  object-fit: cover;
  display: block;
}
		
	</style>
</head>
<body>
<div class="landing">
  <a href="/feed">
    <img class="landing-img" src="/static/landing.png">
  </a>
</div>


<script>
function goToFeed(){
	window.location.href = "{{ url_for('feed') }}"
}
</script>

</body>
</html>
