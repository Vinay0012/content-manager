<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		body{
			margin:0;
			height:100vh;
			overflow:hidden;
		}

		img{
			max-width: 100vw;
			height: 100vh;
			object-fit: cover;
			cursor:pointer;
			transition: opacity 0.3s ease;
			display: block;
		}
		
		img:active{
			opacity:0.7;
		}
	</style>
</head>
<body>

<img src="/static/landing.png" onclick="goToFeed()">

<script>
function goToFeed(){
	window.location.href = "{{ url_for('feed') }}"
}
</script>

</body>
</html>
